<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hill Game</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: #87ceeb;
}

#ui {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;
    background: rgba(255,255,255,0.8);
    padding: 10px;
    border-radius: 10px;
}

canvas { display: block; }

button { margin-top: 5px; }
</style>
</head>

<body>

<div id="ui">
    <input id="name" placeholder="Ник">
    <button onclick="startGame()">Играть</button>
    <div id="score">Score: 0</div>
    <h4>🏆 Топ</h4>
    <div id="top"></div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let car = { x: 100, y: 300 };
let cameraX = 0;
let running = false;
let score = 0;
let namePlayer = "";
let ground = [];

function generateGround() {
    ground = [];
    for (let i = 0; i < 3000; i++) {
        ground.push({
            x: i * 20,
            y: 450 + Math.sin(i * 0.05) * 100
        });
    }
}

function drawGround() {
    ctx.beginPath();
    ctx.moveTo(0, canvas.height);

    for (let p of ground) {
        ctx.lineTo(p.x - cameraX, p.y);
    }

    ctx.lineTo(canvas.width, canvas.height);
    ctx.fillStyle = "#2ecc71";
    ctx.fill();
}

function drawCar() {
    ctx.fillStyle = "red";
    ctx.fillRect(car.x - cameraX, car.y - 25, 50, 25);
}

function update() {
    if (!running) return;

    cameraX += 4;
    car.x += 4;

    let groundY = 450 + Math.sin(car.x * 0.05) * 100;
    car.y = groundY - 25;

    score = Math.floor(car.x / 10);
    document.getElementById("score").innerText = "Score: " + score;

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawGround();
    drawCar();
}

function startGame() {
    namePlayer = document.getElementById("name").value || "Player";
    car = { x: 100, y: 300 };
    cameraX = 0;
    score = 0;

    generateGround();
    running = true;
    update();
}

// 🏆 LOCAL TOP (без сервера)
function saveScore() {
    let top = JSON.parse(localStorage.getItem("top") || "[]");

    top.push({ name: namePlayer, score });

    top.sort((a,b)=>b.score-a.score);
    top = top.slice(0, 10);

    localStorage.setItem("top", JSON.stringify(top));
}

// обновление топа
function renderTop() {
    let top = JSON.parse(localStorage.getItem("top") || "[]");

    document.getElementById("top").innerHTML =
        top.map(t => `<div>${t.name} - ${t.score}</div>`).join("");
}

setInterval(renderTop, 1000);

// сохранить при закрытии
window.addEventListener("beforeunload", saveScore);

</script>

</body>
</html>
